<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Object Detection</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; }
    #dropzone {
      border: 2px dashed #888; border-radius: 8px; padding: 40px;
      text-align: center; color: #666; cursor: pointer;
    }
    #dropzone.dragover { background: #f0f8ff; border-color: #4a90e2; }
    #preview { max-width: 100%; margin-top: 20px; display: none; }
  </style>
</head>
<body>
  <h1>YOLO Object Detection</h1>
  <div id="dropzone">Drag & drop an image here, or click to select</div>
  <input type="file" id="fileInput" accept="image/*" style="display:none">
  <img id="preview" alt="Preview">

  <script>
    const dropzone = document.getElementById("dropzone");
    const fileInput = document.getElementById("fileInput");
    const preview = document.getElementById("preview");

    dropzone.addEventListener("click", () => fileInput.click());
    dropzone.addEventListener("dragover", (e) => { e.preventDefault(); dropzone.classList.add("dragover"); });
    dropzone.addEventListener("dragleave", () => dropzone.classList.remove("dragover"));
    dropzone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropzone.classList.remove("dragover");
      handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener("change", () => handleFile(fileInput.files[0]));

    function handleFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        preview.src = e.target.result;
        preview.style.display = "block";
      };
      reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
